name: Update measurement data

on:
  schedule:
    # 毎週月曜 UTC 03:00 に実行
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Export data from HealthPlanet
        run: npm run export:data
        env:
          HEALTHPLANET_ACCESS_TOKEN: ${{ secrets.HEALTHPLANET_ACCESS_TOKEN }}

      - name: Commit and push if changed
        run: |
          git diff --quiet public/measurement-data.json && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/measurement-data.json
          git commit -m "chore: update measurement data"
          git push origin master
